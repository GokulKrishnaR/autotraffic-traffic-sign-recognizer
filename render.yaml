services:
  - type: web
    name: autotraffic-traffic-sign-recognizer
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate --noinput
    startCommand: gunicorn textproject.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: auto-traffic-sign-recognizer.onrender.com,autotraffic-traffic-sign-recognizer.onrender.com,.onrender.com
