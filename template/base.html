{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Auto Traffic — Sign Recognizer</title>
    <link href="{% static 'css/bootstrap.css' %}" rel="stylesheet">
    <link href="{% static 'css/style.css' %}" rel="stylesheet">
    <style>
        body { background: #0d0d0d; color: #eee; }
        .hero { text-align: center; padding: 2rem 1rem 1rem; }
        .hero h1 { color: #4caf50; font-weight: 700; }
        .panel {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            max-width: 720px;
            margin-left: auto;
            margin-right: auto;
        }
        .panel h2 { color: #8bc34a; font-size: 1.25rem; margin-top: 0; }
        #webcam {
            width: 100%;
            max-width: 640px;
            border: 2px solid #4caf50;
            border-radius: 8px;
            background: #000;
            display: block;
            margin: 0 auto;
        }
        .result-box {
            background: #111;
            border-left: 4px solid #4caf50;
            padding: 1rem;
            margin-top: 1rem;
            border-radius: 4px;
        }
        .btn-success { background: #4caf50; border-color: #4caf50; }
        .upload-input { color: #ccc; margin: 1rem 0; }
    </style>
</head>
<body>
    <div class="hero">
        <h1>Auto Traffic</h1>
        <p class="text-muted">Traffic sign recognition — upload an image or use live camera</p>
    </div>
    {% block content %}{% endblock %}
    <script src="{% static 'js/jquery-2.1.4.min.js' %}"></script>
    <script src="{% static 'js/bootstrap.js' %}"></script>
</body>
</html>
