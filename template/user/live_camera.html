{% extends 'user/base.html' %}
{% load static %}

{% block header %}
<center style="color: #fff; padding: 20px;">
    <h2>Live traffic sign detection</h2>
    <p>Allow camera access when prompted. Point your camera at a traffic sign.</p>

    <div style="max-width: 640px; margin: 0 auto;">
        <video id="webcam" autoplay playsinline muted
            style="width: 100%; max-width: 640px; border: 2px solid #4caf50; border-radius: 8px; background: #111;"></video>
        <canvas id="captureCanvas" width="640" height="480" style="display: none;"></canvas>
    </div>

    <p id="statusMsg" style="margin-top: 12px; color: #ccc;">Click Start camera to begin.</p>

    <h3 id="predictionText" style="color: #4caf50; margin-top: 16px; min-height: 1.5em;"></h3>
    <p id="confidenceText" style="color: #aaa;"></p>

    <p style="margin-top: 20px;">
        <button type="button" id="startBtn" class="btn btn-success">Start camera</button>
        <button type="button" id="stopBtn" class="btn btn-danger" disabled>Stop</button>
    </p>

    <p style="margin-top: 16px;">
        <a href="/prediction" style="color: #8bc34a;">Back to detection</a>
        &nbsp;|&nbsp;
        <a href="/imagebyenter" style="color: #8bc34a;">Upload image instead</a>
    </p>
</center>

<script>
(function () {
    const video = document.getElementById('webcam');
    const canvas = document.getElementById('captureCanvas');
    const ctx = canvas.getContext('2d');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const statusMsg = document.getElementById('statusMsg');
    const predictionText = document.getElementById('predictionText');
    const confidenceText = document.getElementById('confidenceText');

    let stream = null;
    let intervalId = null;
    let busy = false;
    let lastSpoken = '';

    const PREDICT_INTERVAL_MS = 1500;

    function getCookie(name) {
        const match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
        return match ? decodeURIComponent(match[2]) : null;
    }

    function speak(text) {
        if (!window.speechSynthesis || !text || text === lastSpoken) return;
        lastSpoken = text;
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.rate = 1;
        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(utterance);
    }

    async function captureAndPredict() {
        if (busy || !stream) return;
        busy = true;
        try {
            canvas.width = video.videoWidth || 640;
            canvas.height = video.videoHeight || 480;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            const dataUrl = canvas.toDataURL('image/jpeg', 0.85);

            const response = await fetch('/api/predict-frame/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken'),
                },
                body: JSON.stringify({ image: dataUrl }),
            });

            const data = await response.json();
            if (data.error) {
                statusMsg.textContent = data.error;
                return;
            }

            if (data.prediction) {
                predictionText.textContent = data.prediction;
                confidenceText.textContent = 'Confidence: ' + (data.confidence * 100).toFixed(1) + '%';
                speak(data.prediction);
            } else {
                predictionText.textContent = 'No sign detected — hold sign closer to camera';
                confidenceText.textContent = data.confidence
                    ? 'Confidence: ' + (data.confidence * 100).toFixed(1) + '% (below threshold)'
                    : '';
            }
        } catch (err) {
            statusMsg.textContent = 'Prediction failed. Check your connection and try again.';
            console.error(err);
        } finally {
            busy = false;
        }
    }

    async function startCamera() {
        try {
            stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: 'environment', width: { ideal: 640 }, height: { ideal: 480 } },
                audio: false,
            });
            video.srcObject = stream;
            statusMsg.textContent = 'Camera active. Detecting signs…';
            startBtn.disabled = true;
            stopBtn.disabled = false;
            intervalId = setInterval(captureAndPredict, PREDICT_INTERVAL_MS);
        } catch (err) {
            statusMsg.textContent = 'Camera access denied or unavailable. Use HTTPS and allow camera permission.';
            console.error(err);
        }
    }

    function stopCamera() {
        if (intervalId) {
            clearInterval(intervalId);
            intervalId = null;
        }
        if (stream) {
            stream.getTracks().forEach(function (track) { track.stop(); });
            stream = null;
        }
        video.srcObject = null;
        startBtn.disabled = false;
        stopBtn.disabled = true;
        statusMsg.textContent = 'Camera stopped.';
        predictionText.textContent = '';
        confidenceText.textContent = '';
        lastSpoken = '';
        if (window.speechSynthesis) window.speechSynthesis.cancel();
    }

    startBtn.addEventListener('click', startCamera);
    stopBtn.addEventListener('click', stopCamera);
    window.addEventListener('beforeunload', stopCamera);
})();
</script>
{% endblock %}
